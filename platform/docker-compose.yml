version: "3.8"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - mongo
      - redis

  engine:
    build: ./engine-api
    ports:
      - "5001:5001"
    env_file: .env
    depends_on:
      - redis

  worker:
    build: ./engine-api
    command: celery -A worker.celery worker --loglevel=info
    env_file: .env
    depends_on:
      - redis

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"

volumes:
  mongo_data:
